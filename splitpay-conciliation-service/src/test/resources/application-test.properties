# Profile dedicado para testes de integração
# Desabilita configurações desnecessárias para acelerar os testes e evitar dependências externas

# Desabilita a autoconfiguração do Flyway e o DDL do Hibernate para rodar o contexto isolado
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=none

# Exclui autoconfigurações não necessárias para carregar o contexto de forma isolada
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration,org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
