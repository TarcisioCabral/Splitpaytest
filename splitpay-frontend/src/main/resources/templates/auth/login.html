<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::content})}">
<head>
    <title>Acessar Conta | SplitPay IVA</title>
</head>
<body>
    <div th:fragment="content">
        <div class="auth-page">
            <div class="auth-card-premium">
                <div class="auth-header-premium">
                    <div class="auth-logo-large">⚡</div>
                    <h1 class="auth-title-premium">Bem-vindo de volta</h1>
                    <p class="auth-subtitle-premium">Entre com suas credenciais para gerenciar seus splits de impostos.</p>
                </div>
                
                <form id="login-form" class="auth-form-premium">
                    <div class="auth-input-group">
                        <label for="email" class="auth-label-premium">E-mail Corporativo</label>
                        <input type="email" id="email" class="auth-input-premium" required placeholder="ex: diretor@empresa.com.br" autocomplete="email">
                    </div>
                    
                    <div class="auth-input-group">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <label for="password" class="auth-label-premium">Senha de Acesso</label>
                            <a href="#" class="auth-link-premium" style="font-size: 11px;">Esqueceu a senha?</a>
                        </div>
                        <input type="password" id="password" class="auth-input-premium" required placeholder="••••••••" autocomplete="current-password">
                    </div>

                    <div id="error-message" class="error-alert-premium" style="display: none;">
                        <span>⚠️</span>
                        <span id="error-text">E-mail ou senha inválidos</span>
                    </div>

                    <button type="submit" class="auth-btn-premium">
                        <span>Acessar Dashboard</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </button>
                    <div class="auth-divider"><span>ou continue com</span></div>
                    <a href="http://localhost:9084/oauth2/authorization/google" class="google-btn-premium">
                        <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/><path d="M1 1h22v22H1z" fill="none"/></svg>
                        Google Cloud Account
                    </a>
                </form>
                
                <div class="auth-footer-premium">
                    Ainda não tem uma conta institucional? <br>
                    <a th:href="@{/register}" class="auth-link-premium">Solicitar acesso agora</a>
                </div>
            </div>
        </div>

        <script type="module">
            import { login } from '/frontend/api.js';

            const form = document.getElementById('login-form');
            const errorEl = document.getElementById('error-message');
            const errorTextEl = document.getElementById('error-text');
            const submitBtn = form.querySelector('button');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // Visual feedback
                errorEl.style.display = 'none';
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.7';
                submitBtn.querySelector('span').textContent = 'Autenticando...';

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                try {
                    await login(email, password);
                    window.location.href = '/dashboard';
                } catch (err) {
                    errorTextEl.textContent = 'Credenciais incorretas ou conta inativa';
                    errorEl.style.display = 'flex';
                    
                    // Reset button
                    submitBtn.disabled = false;
                    submitBtn.style.opacity = '1';
                    submitBtn.querySelector('span').textContent = 'Acessar Dashboard';
                }
            });
        </script>
    </div>
</body>
</html>
