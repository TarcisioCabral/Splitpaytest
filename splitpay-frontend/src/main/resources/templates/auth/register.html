<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::content})}">
<head>
    <title>Criar Conta | SplitPay IVA</title>
</head>
<body>
    <div th:fragment="content">
        <div class="auth-page">
            <div class="auth-card-premium">
                <div class="auth-header-premium">
                    <div class="auth-logo-large">⚡</div>
                    <h1 class="auth-title-premium">Criar sua conta</h1>
                    <p class="auth-subtitle-premium">Junte-se ao ecossistema SplitPay e automatize a gestão de tributos da sua operação.</p>
                </div>
                
                <form id="register-form" class="auth-form-premium">
                    <div class="auth-input-group">
                        <label for="username" class="auth-label-premium">Nome de Exibição</label>
                        <input type="text" id="username" class="auth-input-premium" required placeholder="ex: Tarcísio Cabral" autocomplete="name">
                    </div>

                    <div class="auth-input-group">
                        <label for="email" class="auth-label-premium">E-mail Corporativo</label>
                        <input type="email" id="email" class="auth-input-premium" required placeholder="ex: tarcisio@empresa.com.br" autocomplete="email">
                    </div>
                    
                    <div class="auth-input-group">
                        <label for="password" class="auth-label-premium">Definir Senha</label>
                        <input type="password" id="password" class="auth-input-premium" required placeholder="Mínimo 6 caracteres" autocomplete="new-password">
                    </div>

                    <div id="error-message" class="error-alert-premium" style="display: none;">
                        <span>⚠️</span>
                        <span id="error-text">Ocorreu um erro ao processar seu cadastro</span>
                    </div>

                    <div id="success-message" class="success-alert" style="display: none; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); color: #a7f3d0; padding: 12px 16px; border-radius: 12px; font-size: 13px; text-align: center;">
                        Conta criada com sucesso! Redirecionando...
                    </div>

                    <button type="submit" class="auth-btn-premium">
                        <span>Concluir Cadastro</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </button>
                </form>
                
                <div class="auth-footer-premium">
                    Já faz parte da plataforma? <br>
                    <a th:href="@{/login}" class="auth-link-premium">Fazer login na conta existente</a>
                </div>
            </div>
        </div>

        <script type="module">
            import { register } from '/frontend/api.js';

            const form = document.getElementById('register-form');
            const errorEl = document.getElementById('error-message');
            const errorTextEl = document.getElementById('error-text');
            const successEl = document.getElementById('success-message');
            const submitBtn = form.querySelector('button');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                errorEl.style.display = 'none';
                successEl.style.display = 'none';
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.7';
                submitBtn.querySelector('span').textContent = 'Processando...';

                const username = document.getElementById('username').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                try {
                    await register(username, email, password);
                    successEl.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } catch (err) {
                    errorTextEl.textContent = err.message || 'Erro ao conectar com o servidor';
                    errorEl.style.display = 'flex';
                    submitBtn.disabled = false;
                    submitBtn.style.opacity = '1';
                    submitBtn.querySelector('span').textContent = 'Concluir Cadastro';
                }
            });
        </script>
    </div>
</body>
</html>
