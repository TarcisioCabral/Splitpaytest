<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SplitPay IVA | Dashboard</title>
  <link rel="stylesheet" th:href="@{/style.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>

<body>

  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <span class="logo-name">SplitPay IVA</span>
      <span class="logo-tag">BETA 2026</span>
    </div>
    <div class="topbar-right">
      <button id="btn-login" class="sim-btn" onclick="simularLogin()" style="padding: 6px 12px; font-size: 12px;">Simular Login Keycloak</button>
      <div class="status-dot" id="status-dot"></div>
      <span class="status-text" id="status-text">ROC: CONNECTED</span>
      <span class="badge-env">FASE TESTE · 1%</span>
    </div>
  </div>

  <div class="nav-tabs">
    <button class="nav-tab active" data-tab="dashboard">Dashboard</button>
    <button class="nav-tab" data-tab="conciliacao">Conciliação NF-e</button>
    <button class="nav-tab" data-tab="simulador">Simulador de Margem</button>
    <button class="nav-tab" data-tab="api">API Docs</button>
    <button class="nav-tab" data-tab="roadmap">Roadmap</button>
    <button class="nav-tab" data-tab="declaracao">Declaração (IBS/CBS)</button>
  </div>

  <!-- MAIN APP CONTAINER FOR SPA ROUTING -->
  <main id="app-content" class="content page active">
     <!-- Pages will be injected here by js/app.js -->
  </main>

  <script type="module" th:src="@{/frontend/app.js}"></script>
</body>

</html>
