<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::title}, ~{::section})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Relatórios e Analytics - SplitPay</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<section>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 24px;" class="animate__animated animate__fadeIn">
        <div>
            <h2 class="card-title" style="font-size: 24px; margin-bottom: 4px;">📈 Analytics e Tendências Fiscais</h2>
            <p style="color: var(--text3); font-size: 14px;">Visualização de retenção de IBS e CBS por período e segmento.</p>
        </div>
        <div style="display: flex; gap: 12px;">
            <button class="btn btn-outline" onclick="window.print()">
                <i class="fa-solid fa-print"></i> Imprimir Tela
            </button>
        </div>
    </div>

    <!-- Seção de Exportação -->
    <div class="card animate__animated animate__fadeInUp" style="margin-bottom: 24px; border: 1px solid rgba(59, 130, 246, 0.2); background: linear-gradient(145deg, var(--surface), rgba(59, 130, 246, 0.05));">
        <div class="card-title" style="color: #3b82f6;">📥 Exportação de Relatórios Detalhados</div>
        <p style="color: var(--text3); font-size: 13px; margin-bottom: 20px;">Selecione o intervalo de datas para gerar o extrato consolidado com todos os cálculos de impostos retidos.</p>
        
        <div style="display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 180px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text2); font-size: 12px; font-weight: 600;">DATA INICIAL</label>
                <input type="date" id="startDate" class="btn btn-outline" style="width: 100%; text-align: left; background: var(--bg-dark); cursor: pointer;">
            </div>
            <div style="flex: 1; min-width: 180px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text2); font-size: 12px; font-weight: 600;">DATA FINAL</label>
                <input type="date" id="endDate" class="btn btn-outline" style="width: 100%; text-align: left; background: var(--bg-dark); cursor: pointer;">
            </div>
            <button class="btn btn-primary" onclick="exportToExcel()" style="height: 42px; padding: 0 24px; font-weight: 600; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);">
                <i class="fa-solid fa-file-excel" style="margin-right: 8px;"></i> Gerar Planilha Excel (.xlsx)
            </button>
        </div>
    </div>
 
    <div class="two-col">
        <div class="card animate__animated animate__fadeInLeft">
            <div class="card-title">Retenção por Segmento</div>
            <canvas id="segmentChart"></canvas>
        </div>
        <div class="card animate__animated animate__fadeInRight">
            <div class="card-title">Tendência por Período</div>
            <canvas id="periodChart"></canvas>
        </div>
    </div>

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', async () => {
            // Fetch segment data
            const segRes = await fetch('/api/v1/reports/trends/segment');
            const segData = await segRes.json();
            
            const segmentCtx = document.getElementById('segmentChart').getContext('2d');
            new Chart(segmentCtx, {
                type: 'bar',
                data: {
                    labels: segData.map(d => d.segmento),
                    datasets: [
                        {
                            label: 'IBS',
                            data: segData.map(d => d.total_ibs),
                            backgroundColor: 'rgba(16, 185, 129, 0.6)',
                            borderColor: '#10b981',
                            borderWidth: 1
                        },
                        {
                            label: 'CBS',
                            data: segData.map(d => d.total_cbs),
                            backgroundColor: 'rgba(59, 130, 246, 0.6)',
                            borderColor: '#3b82f6',
                            borderWidth: 1
                        }
                    ]
                },
                options: { 
                    responsive: true, 
                    plugins: { legend: { labels: { color: '#fafaf9' } } },
                    scales: { 
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#a8a29e' } },
                        x: { grid: { display: false }, ticks: { color: '#a8a29e' } }
                    }
                }
            });

            // Fetch period data
            const perRes = await fetch('/api/v1/reports/trends/period');
            const perData = await perRes.json();

            const periodCtx = document.getElementById('periodChart').getContext('2d');
            new Chart(periodCtx, {
                type: 'line',
                data: {
                    labels: perData.map(d => d.data),
                    datasets: [
                        {
                            label: 'IBS Total',
                            data: perData.map(d => d.total_ibs),
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            fill: true,
                            tension: 0.4
                        },
                        {
                            label: 'CBS Total',
                            data: perData.map(d => d.total_cbs),
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            fill: true,
                            tension: 0.4
                        }
                    ]
                },
                options: { 
                    responsive: true,
                    plugins: { legend: { labels: { color: '#fafaf9' } } },
                    scales: { 
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#a8a29e' } },
                        x: { grid: { display: false }, ticks: { color: '#a8a29e' } }
                    }
                }
            });
        });

        function exportToExcel() {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            
            let url = '/api/v1/reports/export/excel';
            const params = new URLSearchParams();
            
            if (start) params.append('startDate', start);
            if (end) params.append('endDate', end);
            
            if (params.toString()) {
                url += '?' + params.toString();
            }
            
            // Feedback visual antes de iniciar o download
            const btn = document.querySelector('button[onclick="exportToExcel()"]');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Gerando...';
            btn.disabled = true;

            // Inicia o download abrindo em nova aba/janela
            // Como é um download direto via browser, retornamos o botão ao estado normal após um curto delay
            window.location.href = url;

            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }, 2000);
        }
    </script>
</section>
</body>
</html>
