# Profile dedicado para testes de integração
# Desabilita configurações desnecessárias para acelerar os testes e evitar dependências externas

# Desabilita o auto-startup do listener do RabbitMQ para não tentar conectar na porta padrão
spring.rabbitmq.listener.simple.auto-startup=false

# Exclui a autoconfiguração do RabbitMQ quando não for estritamente necessária no teste
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
